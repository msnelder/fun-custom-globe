  <script type="module">
    import * as THREE from 'three';
    // ─── Preview background via ?bg= URL param ───────────────────────────────
    const bg = new URLSearchParams(location.search).get('bg');
    if (bg) {
      document.body.style.setProperty('--preview-bg', `#${bg.replace(/^#/, '')}`);
      document.body.classList.add('has-bg');

    // ─── Renderer ────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    // ─── Scene & Camera ──────────────────────────────────────────────────────
    const scene = new THREE.Scene();

    // ─── Globe group ─────────────────────────────────────────────────────────
    const globe = new THREE.Group();
    scene.add(globe);

    const sphereGeo = new THREE.SphereGeometry(1, 64, 64);

    // ─── Radial inner glow (transparent) ─────────────────────────────────────
    // Fully transparent at center, glow builds radially toward the edges.
    globe.add(new THREE.Mesh(
      sphereGeo,
      new THREE.ShaderMaterial({
        vertexShader: `

          void main() {

          }

        fragmentShader: `

      sphereGeo,
      new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float rim     = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
            rim           = pow(rim, 3.5);

    // ─── Atmospheric halo ────────────────────────────────────────────────────
    globe.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.05, 64, 64),
      new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            vNormal   = normalize(normalMatrix * normal);
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float rim   = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
            float halo  = pow(rim, 3.5);
            // Directional bias: brighter in upper-left (BackSide normals are inverted)
            float bias  = clamp(0.5 + 0.5 * dot(vNormal, normalize(vec3(-0.5, 0.5, 0.0))), 0.0, 1.0);

          }
        `,
        transparent: true,
        blending:    THREE.AdditiveBlending,
        depthWrite:  false,
        side:        THREE.BackSide,
      })
    ));

    // ─── Pre-computed land-only dots with coastal bias ───────────────────────
    const DOT_COUNT = DOT_POSITIONS.length / 3;
    const positions = DOT_POSITIONS;
    const opacities = new Float32Array(DOT_COUNT).fill(1.0);
    const dpr       = renderer.getPixelRatio();

    // ─── City proximity weights for flash bias ────────────────────────────────
    const FLASH_CITIES = [
      [-74.0,40.7],[- 87.6,41.9],[-118.2,34.1],[-122.4,37.8],[-79.4,43.7],
      [-97.7,30.3],[-77.0,38.9],[-71.1,42.4],[-99.1,19.4],[-46.6,-23.5],
      [-43.2,-22.9],[-58.4,-34.6],[-70.7,-33.5],[-74.1,4.7],[-0.1,51.5],
      [2.3,48.9],[13.4,52.5],[12.5,41.9],[-3.7,40.4],[18.1,59.3],
      [4.9,52.4],[16.4,48.2],[37.6,55.8],[30.5,50.5],[2.2,41.4],
      [3.4,6.5],[36.8,-1.3],[28.0,-26.2],[31.2,30.1],[38.7,9.0],
      [39.8,21.4],[44.4,33.3],[55.3,25.3],[46.7,24.7],[51.5,25.3],
      [121.5,31.2],[116.4,39.9],[139.7,35.7],[127.0,37.6],[114.2,22.3],
      [103.8,1.4],[77.2,28.6],[72.9,19.1],[88.4,22.6],[106.7,10.8],
      [100.5,13.8],[106.8,-6.2],[120.9,14.6],[90.4,23.7],[67.0,24.9],
      [151.2,-33.9],[144.9,-37.8],[174.8,-36.9],
    ];
    const CITY_R = 5.0;
    const dotCityWeights = new Float32Array(DOT_COUNT);
    for (let i = 0; i < DOT_COUNT; i++) {
      const x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
      const lat = Math.asin(y) * 180 / Math.PI;
      const lon = Math.atan2(z, x) * 180 / Math.PI;
      let best = 0;
      for (const [cLon, cLat] of FLASH_CITIES) {
        const d = Math.sqrt((lon-cLon)**2 + (lat-cLat)**2);
        if (d < CITY_R) { const s = 1 - d/CITY_R; if (s > best) best = s; }
      }
      // Regional boost for high-priority areas
      const regions = [
        { lonMin: -170, lonMax: -50, latMin: 15, latMax: 75 },  // North America
        { lonMin: -15,  lonMax: 45,  latMin: 35, latMax: 72 },  // Europe
        { lonMin: 124,  lonMax: 130, latMin: 34, latMax: 39 },  // South Korea
        { lonMin: 129,  lonMax: 146, latMin: 30, latMax: 46 },  // Japan
        { lonMin: 113,  lonMax: 154, latMin: -44, latMax: -10 }, // Australia
        { lonMin: 166,  lonMax: 178, latMin: -47, latMax: -34 }, // New Zealand
      ];
      let regionBoost = 0;
      for (const r of regions) {
        if (lon >= r.lonMin && lon <= r.lonMax && lat >= r.latMin && lat <= r.latMax) {
          regionBoost = 0.5; break;
        }
      }
      dotCityWeights[i] = Math.min(1.0, 0.2 + 0.8 * best + regionBoost);
    }

    // ─── Flash state ─────────────────────────────────────────────────────────
    const FLASH_HOLD  = 1.0;
    const FLASH_FADE  = 2.0;
    const FLASH_TOTAL = FLASH_HOLD + FLASH_FADE;

    const flashTimers = new Float32Array(DOT_COUNT).fill(-999); // when each flash started
    const flashVals   = new Float32Array(DOT_COUNT);            // current flash intensity 0–1

    const dotsGeo = new THREE.BufferGeometry();
    dotsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    dotsGeo.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));

    const flashAttr = new THREE.BufferAttribute(flashVals, 1);
    flashAttr.setUsage(THREE.DynamicDrawUsage); // tell GPU this updates every frame
    dotsGeo.setAttribute('aFlash', flashAttr);

    const dotsMat = new THREE.ShaderMaterial({
      uniforms: {
        uSize: { value: 5.4 * dpr },
      },
      vertexShader: `
        uniform float uSize;
        attribute float aOpacity;
        attribute float aFlash;
        varying float vOpacity;
        varying float vFlash;

        void main() {
          vec4 mvPos      = modelViewMatrix * vec4(position, 1.0);
          float depth     = clamp((-mvPos.z - 2.0) / 2.0, 0.0, 1.0);
          float depthFade = 0.05 + 0.95 * (1.0 - depth);
          vOpacity = aOpacity * depthFade;
          vFlash   = aFlash;
          gl_PointSize = uSize;
          gl_Position  = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        varying float vOpacity;
        varying float vFlash;

        void main() {
          vec2  uv = gl_PointCoord - vec2(0.5);
          float r  = length(uv);
          if (r > 0.5) discard;
          float alpha = 1.0 - smoothstep(0.25, 0.5, r);

          vec3 base    = vec3(0.45, 0.45, 0.45);       // resting gray
          vec3 flashed = vec3(0.95, 0.97, 1.00);        // near-white flash
          vec3 color   = mix(base, flashed, vFlash);

          // Resting dots 30% dimmer; flashing dots unaffected
          float opacityMult = mix(0.4, 1.0, vFlash);
          gl_FragColor = vec4(color, alpha * vOpacity * opacityMult);
        }
      `,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.NormalBlending,
    });

    globe.add(new THREE.Points(dotsGeo, dotsMat));

    // ─── Line pool ───────────────────────────────────────────────────────────
    const LINE_POOL     = 20;
    const LINE_MAX_H    = 0.12;  // max length above surface
    const LINE_GROW     = 0.4;   // seconds to grow to full height
    const LINE_HOLD     = 6.0;   // seconds at full height
    const LINE_SHRINK   = 2.0;   // seconds to shrink back down
    const LINE_TOTAL    = LINE_GROW + LINE_HOLD + LINE_SHRINK;

    const spikeGlowGeo = new THREE.CylinderGeometry(0.006, 0.006, 1, 16, 1, true);
    const _yAxis       = new THREE.Vector3(0, 1, 0);

    const linePool = [];
    for (let i = 0; i < LINE_POOL; i++) {
      const glowMat  = new THREE.ShaderMaterial({
        uniforms: { uOpacity: { value: 0.6 } },
        vertexShader: `
          varying vec3 vNormal;
          varying vec2 vUv;
          void main() {
            vNormal     = normalize(normalMatrix * normal);
            vUv         = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uOpacity;
          varying vec3  vNormal;
          varying vec2  vUv;
          void main() {
            float facing   = abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
            float glow     = pow(facing, 2.0);
            float topFade  = 1.0 - smoothstep(0.4, 1.0, vUv.y);
            gl_FragColor   = vec4(1.0, 1.0, 1.0, glow * topFade * uOpacity);
          }
        `,
        transparent: true,
        depthWrite:  false,
        blending:    THREE.AdditiveBlending,
        side:        THREE.FrontSide,
      });

      const glowMesh = new THREE.Mesh(spikeGlowGeo, glowMat);
      glowMesh.visible = false;
      globe.add(glowMesh);
      linePool.push({ line: glowMesh, mat: glowMat, glow: glowMesh, glowMat, time: -999, nx: 0, ny: 0, nz: 0, maxH: 0.12 });
    }
    let nextLine = 0;

    function triggerLine(px, py, pz, time) {
      const l = linePool[nextLine];
      nextLine = (nextLine + 1) % LINE_POOL;
      const len = Math.sqrt(px*px + py*py + pz*pz);
      l.nx = px / len; l.ny = py / len; l.nz = pz / len;
      l.time = time;
      l.maxH = 0.04 + Math.random() * 0.16;
      l.line.visible = true;
    }

    // ─── Resize ──────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Drag to rotate ──────────────────────────────────────────────────────
    const AUTO_SPEED = 0.0003;
    const DRAG_SCALE = 0.005;
    const FRICTION   = 0.92;

    let isDragging = false;
    let prevX = 0, prevY = 0;
    let velX = 0, velY = 0;

    function onPointerDown(e) {
      isDragging = true;
      prevX = e.clientX; prevY = e.clientY;
      velX = 0; velY = 0;
      renderer.domElement.style.cursor = 'grabbing';
    }
    function onPointerMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;

      velY = dy * DRAG_SCALE;
      globe.rotation.y += velX;
      globe.rotation.x += velY;
      globe.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, globe.rotation.x));

    function onPointerUp() {
      isDragging = false;
      renderer.domElement.style.cursor = 'grab';
    }
    renderer.domElement.style.cursor = 'grab';
    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ─── Animate ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        const t = clock.getElapsedTime();
        flashTimers.fill(-999);
        flashVals.fill(0);
        flashAttr.needsUpdate = true;
        for (let i = 0; i < LINE_POOL; i++) { linePool[i].time = -999; linePool[i].line.visible = false; }

        lastT = t;
      }
    });

    let nextFlashAt = 0.5;
    function scheduleNextFlash() {
      nextFlashAt += 0.4 + Math.random() * 0.2;
    }

    let lastT = 0;

    (function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

          globe.rotation.x += velY;

          globe.rotation.y += AUTO_SPEED;

      let dirty = false;

      if (elapsed >= nextFlashAt) {
        scheduleNextFlash();
        const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        const nMat   = new THREE.Matrix3().getNormalMatrix(globe.matrixWorld);
        const candidates = [];
        for (let j = 0; j < DOT_COUNT; j++) {
          if (elapsed - flashTimers[j] < FLASH_TOTAL) continue;
          const wx = positions[j * 3], wy = positions[j * 3 + 1], wz = positions[j * 3 + 2];
          const nx = nMat.elements[0]*wx + nMat.elements[3]*wy + nMat.elements[6]*wz;
          const ny = nMat.elements[1]*wx + nMat.elements[4]*wy + nMat.elements[7]*wz;
          const nz = nMat.elements[2]*wx + nMat.elements[5]*wy + nMat.elements[8]*wz;
          const facing = -(nx * camDir.x + ny * camDir.y + nz * camDir.z);
          if (facing > 0.5) candidates.push(j);
        }
        if (candidates.length > 0) {
          // Weighted pick — city dots more likely to flash
          let totalW = 0;
          for (const j of candidates) totalW += dotCityWeights[j];
          let r = Math.random() * totalW;
          let pick = candidates[0];
          for (const j of candidates) { r -= dotCityWeights[j]; if (r <= 0) { pick = j; break; } }
          flashTimers[pick] = elapsed;
          triggerLine(positions[pick*3], positions[pick*3+1], positions[pick*3+2], elapsed);
          dirty = true;
        }
      }

      // ── Update flash values ─────────────────────────────────────────────────
      for (let i = 0; i < DOT_COUNT; i++) {
        const a = elapsed - flashTimers[i];
        let v = 0.0;
        if (a < FLASH_HOLD) {
          v = 1.0;
        } else if (a < FLASH_TOTAL) {
          const p = (a - FLASH_HOLD) / FLASH_FADE;
          const s = p * p * (3.0 - 2.0 * p);
          v = 1.0 - s;
        }
        if (flashVals[i] !== v) { flashVals[i] = v; dirty = true; }
      }

      if (dirty) flashAttr.needsUpdate = true;

      // ── Animate lines ───────────────────────────────────────────────────────
      for (let i = 0; i < LINE_POOL; i++) {
        const l = linePool[i];
        const age = elapsed - l.time;
        if (age < 0 || age > LINE_TOTAL) { l.line.visible = false; continue; }

        let length;
        if (age < LINE_GROW) {
          length = (age / LINE_GROW) * l.maxH;
        } else if (age < LINE_GROW + LINE_HOLD) {
          length = l.maxH;
        } else {
          length = l.maxH * (1.0 - (age - LINE_GROW - LINE_HOLD) / LINE_SHRINK);
        }

        const opacity = age < LINE_GROW + LINE_HOLD ? 1.0 : 1.0 - (age - LINE_GROW - LINE_HOLD) / LINE_SHRINK;
        l.glowMat.uniforms.uOpacity.value = opacity * 0.6;

        const normal = new THREE.Vector3(l.nx, l.ny, l.nz);
        const glowMid = 1.002 + length * 0.875;
        l.glow.position.set(l.nx * glowMid, l.ny * glowMid, l.nz * glowMid);
        l.glow.scale.set(1, length * 1.75, 1);
        l.glow.quaternion.setFromUnitVectors(_yAxis, normal);
        l.glow.visible = true;

      }

      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
