  <script type="module">
    import * as THREE from 'three';
    // ─── Preview background via ?bg= URL param ───────────────────────────────
    const bg = new URLSearchParams(location.search).get('bg');
    if (bg) {
      document.body.style.setProperty('--preview-bg', `#${bg.replace(/^#/, '')}`);
      document.body.classList.add('has-bg');
    }

    // ─── Renderer ────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);

    // ─── Scene & Camera ──────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 3;

    // ─── Globe group ─────────────────────────────────────────────────────────
    const globe = new THREE.Group();
    scene.add(globe);

    const sphereGeo = new THREE.SphereGeometry(1, 64, 64);

    // ─── Radial inner glow (transparent) ─────────────────────────────────────
    // Fully transparent at center, glow builds radially toward the edges.
    globe.add(new THREE.Mesh(
      sphereGeo,
      new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            // 0 at center (normal faces camera), 1 at silhouette edge
            float rim  = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
            float glow = pow(rim, 1.4); // lower power = more gradual fill

            vec3 lit  = vec3(0.133, 0.133, 0.133); // #222222
            gl_FragColor = vec4(lit, glow * 0.85);
          }
        `,
        transparent: true,
        blending:    THREE.AdditiveBlending,
        depthWrite:  false,
      })
    ));

    // ─── Rim / glimmer (Fresnel shader) ──────────────────────────────────────
    globe.add(new THREE.Mesh(
      sphereGeo,
      new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float rim     = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
            rim           = pow(rim, 3.5);
            float glimmer = clamp(0.4 + vNormal.y * 0.4 - vNormal.x * 0.3, 0.0, 1.0);
            vec3 color    = mix(vec3(0.3, 0.35, 0.5), vec3(0.75, 0.85, 1.0), glimmer);
            gl_FragColor  = vec4(color, rim * 0.55);
          }
        `,
        transparent: true,
        blending:    THREE.AdditiveBlending,
        depthWrite:  false,
      })
    ));

    // ─── Atmospheric halo ────────────────────────────────────────────────────
    globe.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.05, 64, 64),
      new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            vNormal   = normalize(normalMatrix * normal);
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float rim   = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
            float halo  = pow(rim, 3.5);
            vec3  color = vec3(0.55, 0.55, 0.55);
            gl_FragColor = vec4(color, halo * 0.22);
          }
        `,
        transparent: true,
        blending:    THREE.AdditiveBlending,
        depthWrite:  false,
        side:        THREE.BackSide,
      })
    ));

    // ─── Pre-computed land-only dots with coastal bias ───────────────────────
    const DOT_COUNT = DOT_POSITIONS.length / 3;
    const positions = DOT_POSITIONS;
    const opacities = new Float32Array(DOT_COUNT).fill(1.0);
    const dpr       = renderer.getPixelRatio();

    // ─── Flash state ─────────────────────────────────────────────────────────
    const FLASH_HOLD  = 1.0;
    const FLASH_FADE  = 2.0;
    const FLASH_TOTAL = FLASH_HOLD + FLASH_FADE;

    const flashTimers = new Float32Array(DOT_COUNT).fill(-999); // when each flash started
    const flashVals   = new Float32Array(DOT_COUNT);            // current flash intensity 0–1

    const dotsGeo = new THREE.BufferGeometry();
    dotsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    dotsGeo.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));

    const flashAttr = new THREE.BufferAttribute(flashVals, 1);
    flashAttr.setUsage(THREE.DynamicDrawUsage); // tell GPU this updates every frame
    dotsGeo.setAttribute('aFlash', flashAttr);

    const dotsMat = new THREE.ShaderMaterial({
      uniforms: {
        uSize: { value: 5.4 * dpr },
      },
      vertexShader: `
        uniform float uSize;
        attribute float aOpacity;
        attribute float aFlash;
        varying float vOpacity;
        varying float vFlash;

        void main() {
          vec4 mvPos      = modelViewMatrix * vec4(position, 1.0);
          float depth     = clamp((-mvPos.z - 2.0) / 2.0, 0.0, 1.0);
          float depthFade = 0.05 + 0.95 * (1.0 - depth);
          vOpacity = aOpacity * depthFade;
          vFlash   = aFlash;
          gl_PointSize = uSize;
          gl_Position  = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        varying float vOpacity;
        varying float vFlash;

        void main() {
          vec2  uv = gl_PointCoord - vec2(0.5);
          float r  = length(uv);
          if (r > 0.5) discard;
          float alpha = 1.0 - smoothstep(0.25, 0.5, r);

          vec3 base    = vec3(0.45, 0.45, 0.45);       // resting gray
          vec3 flashed = vec3(0.95, 0.97, 1.00);        // near-white flash
          vec3 color   = mix(base, flashed, vFlash);

          // Resting dots 30% dimmer; flashing dots unaffected
          float opacityMult = mix(0.4, 1.0, vFlash);
          gl_FragColor = vec4(color, alpha * vOpacity * opacityMult);
        }
      `,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.NormalBlending,
    });

    globe.add(new THREE.Points(dotsGeo, dotsMat));

    // ─── Resize ──────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Drag to rotate ──────────────────────────────────────────────────────
    const AUTO_SPEED = 0.0003;
    const DRAG_SCALE = 0.005;
    const FRICTION   = 0.92;

    let isDragging = false;
    let prevX = 0, prevY = 0;
    let velX = 0, velY = 0;

    function onPointerDown(e) {
      isDragging = true;
      prevX = e.clientX; prevY = e.clientY;
      velX = 0; velY = 0;
      renderer.domElement.style.cursor = 'grabbing';
    }
    function onPointerMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      velX = dx * DRAG_SCALE;
      velY = dy * DRAG_SCALE;
      globe.rotation.y += velX;
      globe.rotation.x += velY;
      globe.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, globe.rotation.x));
      prevX = e.clientX; prevY = e.clientY;
    }
    function onPointerUp() {
      isDragging = false;
      renderer.domElement.style.cursor = 'grab';
    }
    renderer.domElement.style.cursor = 'grab';
    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ─── Animate ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) clock.stop(); else clock.start();
    });

    let nextFlashAt = 0.5;
    function scheduleNextFlash() {
      nextFlashAt += 0.8 + Math.random() * 0.4;
    }

    let lastT = 0;

    (function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const dt      = elapsed - lastT;
      lastT         = elapsed;

      // ── Rotation ────────────────────────────────────────────────────────────
      if (!isDragging) {
        velX *= FRICTION;
        velY *= FRICTION;
        if (Math.abs(velX) > 0.00001 || Math.abs(velY) > 0.00001) {
          globe.rotation.y += velX;
          globe.rotation.x += velY;
          globe.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, globe.rotation.x));
        } else {
          globe.rotation.y += AUTO_SPEED;
        }
      }

      // ── Smarter flashing: one dot at a time, front hemisphere only ──────────
      let dirty = false;

      if (elapsed >= nextFlashAt) {
        scheduleNextFlash();
        const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        const nMat   = new THREE.Matrix3().getNormalMatrix(globe.matrixWorld);
        const candidates = [];
        for (let j = 0; j < DOT_COUNT; j++) {
          if (elapsed - flashTimers[j] < FLASH_TOTAL) continue;
          const wx = positions[j * 3], wy = positions[j * 3 + 1], wz = positions[j * 3 + 2];
          const nx = nMat.elements[0]*wx + nMat.elements[3]*wy + nMat.elements[6]*wz;
          const ny = nMat.elements[1]*wx + nMat.elements[4]*wy + nMat.elements[7]*wz;
          const nz = nMat.elements[2]*wx + nMat.elements[5]*wy + nMat.elements[8]*wz;
          const facing = -(nx * camDir.x + ny * camDir.y + nz * camDir.z);
          if (facing > 0.5) candidates.push(j);
        }
        if (candidates.length > 0) {
          const pick = candidates[Math.floor(Math.random() * candidates.length)];
          flashTimers[pick] = elapsed;
          dirty = true;
        }
      }

      // ── Update flash values ─────────────────────────────────────────────────
      for (let i = 0; i < DOT_COUNT; i++) {
        const a = elapsed - flashTimers[i];
        let v = 0.0;
        if (a < FLASH_HOLD) {
          v = 1.0;
        } else if (a < FLASH_TOTAL) {
          const p = (a - FLASH_HOLD) / FLASH_FADE;
          const s = p * p * (3.0 - 2.0 * p);
          v = 1.0 - s;
        }
        if (flashVals[i] !== v) { flashVals[i] = v; dirty = true; }
      }

      if (dirty) flashAttr.needsUpdate = true;

      renderer.render(scene, camera);
    })();
